<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Dumpster Empire</title>
  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/layout.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <script type="importmap">
    {
      "imports": {
        "@dumpster/engine": "../../packages/engine/src/index.js"
      }
    }
  </script>
</head>
<body>
  <div id="app" data-state="loading">
    <p id="boot-status">Cargando Dumpster Empire…</p>

    <div class="game-shell">
      <header id="topbar">
        <span id="money">Dinero: $0</span>
        <span id="keys">Llaves: 0</span>
        <button id="settings-btn" type="button">Ajustes</button>
      </header>

      <main id="dig-area">
        <div id="dig-empty" class="dig-state">
          <p>Elegí un contenedor para escarbar.</p>
          <button type="button" data-start-dig="tachoVereda">Escarbar el Tacho de Vereda (gratis)</button>
        </div>
        <div id="dig-active" class="dig-state" hidden>
          <h2 id="dig-container-title"></h2>
          <div id="dig-rarity-glow"></div>
          <div id="dig-canvas-host"></div>
          <div id="dig-progress"><div id="dig-progress-fill"></div></div>
          <p id="dig-trap-hint"></p>
          <button type="button" id="dig-abandon-btn" hidden>Abandonar</button>
        </div>
      </main>

      <section id="quick-upgrades"></section>

      <nav id="tabbar">
        <button type="button" data-tab="tienda">Tienda</button>
        <button type="button" data-tab="automatizacion">Automatización</button>
        <button type="button" data-tab="logros">Logros</button>
        <button type="button" data-tab="prestigio">Prestigio</button>
      </nav>
      <section id="tab-content"></section>
    </div>

    <div id="toast-container" aria-live="polite"></div>
    <div id="tutorial-overlay" hidden></div>
    <div id="offline-modal" class="modal-overlay" hidden></div>
    <div id="category-modal" class="modal-overlay" hidden></div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
