<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Dumpster Empire</title>
  <!-- DECISIÓN (Agente 8, re-anclaje a "The Workshop", PLAN.md §5.3): reemplaza Fredoka/Nunito/
       JetBrains Mono (Fase 4) por Plus Jakarta Sans (400/500/700/800), la única familia del
       mockup canónico, para titulares, números y cuerpo. Se mantiene vía Google Fonts (OFL, sin
       atribución obligatoria) por el mismo motivo que documentó el Agente 4: no meter un paso de
       build en apps/game (CLAUDE.md prohíbe bundler). RIESGO PARA EL AGENTE 10 (Steam): el build
       de Electron corre offline en Steam Deck/desktop — hay que descargar los .woff2 reales a
       apps/game/assets/fonts/, reemplazar este <link> por @font-face local y sumar la atribución
       OFL a los créditos antes de empaquetar (mismo riesgo que ya señalaba el Agente 4, ahora con
       una sola familia en vez de tres). No se usa Material Symbols: se mantiene el registro SVG
       propio de icons/icons.js (Agente 3), 100% original y sin licencia que declarar — evita
       sumar un segundo riesgo de auto-hospedaje offline. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/layout.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <script type="importmap">
    {
      "imports": {
        "@dumpster/engine": "../../packages/engine/src/index.js"
      }
    }
  </script>
</head>
<body>
  <div id="app" data-state="loading">
    <p id="boot-status">Cargando Dumpster Empire…</p>

    <div id="title-screen" class="title-screen" hidden></div>

    <div class="game-shell" hidden>
      <header id="topbar">
        <span class="brand">DUMPSTER EMPIRE</span>
        <div class="topbar-stats">
          <span id="money" class="stat-pill">Dinero: $0</span>
          <span id="keys" class="stat-pill">Llaves: 0</span>
        </div>
        <button id="settings-btn" class="icon-btn-circle" type="button">Ajustes</button>
      </header>

      <main id="dig-area">
        <div id="dig-empty" class="dig-state">
          <p>Elegí un contenedor para escarbar.</p>
          <button type="button" data-start-dig="tachoVereda">Escarbar el Tacho de Vereda (gratis)</button>
        </div>
        <div id="dig-active" class="dig-state" hidden>
          <div class="scavenge-card">
            <span id="dig-container-title" class="scavenge-card-label"></span>
            <div class="scavenge-card-metal-texture"></div>
            <div id="dig-rarity-glow"></div>
            <div id="dig-canvas-host"></div>
          </div>
          <div id="dig-progress"><div id="dig-progress-fill"></div></div>
          <p id="dig-trap-hint"></p>
          <button type="button" id="dig-abandon-btn" hidden>Abandonar</button>
        </div>
      </main>

      <section id="quick-upgrades"></section>

      <nav id="tabbar">
        <button type="button" data-tab="tienda">Tienda</button>
        <button type="button" data-tab="automatizacion">Automatización</button>
        <button type="button" data-tab="logros">Logros</button>
        <button type="button" data-tab="prestigio">Prestigio</button>
        <button type="button" data-tab="index">INDEX</button>
      </nav>
      <section id="tab-content"></section>
    </div>

    <div id="toast-container" aria-live="polite"></div>
    <div id="tutorial-overlay" hidden></div>
    <div id="offline-modal" class="modal-overlay" hidden></div>
    <div id="category-modal" class="modal-overlay" hidden></div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
