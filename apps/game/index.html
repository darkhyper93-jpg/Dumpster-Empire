<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Dumpster Empire</title>
  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/layout.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <script type="importmap">
    {
      "imports": {
        "@dumpster/engine": "../../packages/engine/src/index.js"
      }
    }
  </script>
</head>
<body>
  <div id="app">
    <header id="topbar">
      <span id="money">Dinero: $0</span>
      <span id="keys">Llaves: 0</span>
      <button id="settings-btn" type="button">Ajustes</button>
    </header>

    <main id="dig-area">
      <!-- Agente 2: acá va el canvas de escarbado (DigCanvas.js) -->
    </main>

    <section id="quick-upgrades">
      <button type="button" data-upgrade="suerte">Suerte ▲</button>
      <button type="button" data-upgrade="fuerza">Fuerza ▲</button>
      <button type="button" data-upgrade="area">Área ▲</button>
    </section>

    <nav id="tabbar">
      <button type="button" data-tab="tienda">Tienda</button>
      <button type="button" data-tab="automatizacion">Automatización</button>
      <button type="button" data-tab="logros">Logros</button>
      <button type="button" data-tab="prestigio">Prestigio</button>
    </nav>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
