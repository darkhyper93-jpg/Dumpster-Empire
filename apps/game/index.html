<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <!-- DECISIÓN (auditoría de seguridad): CSP como defensa en profundidad. La UI construye DOM con
       innerHTML en varias vistas; si algún día se filtrara HTML inyectado, script-src sin
       'unsafe-inline' impide ejecutar JS externo o inline. El único script inline es el import map
       de abajo: se habilita con su hash sha256 (NO con 'unsafe-inline', que abriría la puerta a
       cualquier script inyectado). IMPORTANTE: si cambia el contenido del import map, recalcular el
       hash con `node -e '...'` (crypto.createHash sha256 del texto entre las etiquetas) y
       actualizarlo acá, o el juego no cargará. 'unsafe-inline' solo se concede a style-src (hay
       atributos style="" en el markup); img-src data: cubre los íconos SVG rasterizados de
       icons/icons.js. 'self' resuelve al origen actual en ambos modos: http en dev (npx serve) y
       dumpster:// en Electron. -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'sha256-koVbAu6FOADp40i9Sue214iR0cwLHy4ZiHXdyFgcmsY='; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; base-uri 'none'; object-src 'none'" />
  <title>Dumpster Empire</title>
  <!-- Ícono de la app (reference/ui/logo.png): favicon en modo web/dev; en Electron el ícono
       de ventana/ejecutable sale de apps/desktop/build/icon.png vía electron-builder. -->
  <link rel="icon" type="image/png" href="assets/icon.png" />
  <!-- DECISIÓN (Agente 10, empaquetado Steam, PLAN.md §5.3): Plus Jakarta Sans (400/500/700/800)
       auto-hospedada en apps/game/assets/fonts/ vía @font-face en styles/fonts.css, en vez del
       <link> a Google Fonts que traía la Fase 8. El build de Electron/Steam Deck corre offline
       (CLAUDE.md), así que no podemos depender de una CDN externa en tiempo de carga. Licencia
       SIL OFL 1.1 por Tokotype (no requiere atribución obligatoria en el producto — se deja
       constancia acá, en el repo, en vez de en la UI de Ajustes, que perdió su sección de
       Créditos en la ronda 14). No se usa Material Symbols: se mantiene el registro SVG propio
       de icons/icons.js (Agente 3), 100% original y sin licencia que declarar. -->
  <link rel="stylesheet" href="styles/fonts.css" />
  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/layout.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <script type="importmap">
    {
      "imports": {
        "@dumpster/engine": "../../packages/engine/src/index.js"
      }
    }
  </script>
</head>
<body>
  <div id="app" data-state="loading">
    <p id="boot-status">Cargando… / Loading…</p>

    <div id="title-screen" class="title-screen" hidden></div>

    <div class="game-shell" hidden data-active-tab="escarbar">
      <header id="topbar">
        <span class="brand">DUMPSTER EMPIRE</span>
        <div class="topbar-stats">
          <span id="money" class="stat-pill">Dinero: $0</span>
          <span id="keys" class="stat-pill">Llaves: 0</span>
        </div>
        <button id="settings-btn" class="icon-btn-circle" type="button">Ajustes</button>
      </header>

      <main id="dig-area">
        <div id="dig-empty" class="dig-state dig-picker"></div>
        <div id="dig-active" class="dig-state" hidden>
          <div class="scavenge-card">
            <span id="dig-container-title" class="scavenge-card-label"></span>
            <div class="scavenge-card-metal-texture"></div>
            <div id="dig-rarity-glow"></div>
            <div id="dig-canvas-host"></div>
          </div>
          <div id="dig-progress"><div id="dig-progress-fill"></div></div>
          <p id="dig-trap-hint"></p>
          <button type="button" id="dig-abandon-btn" hidden>Abandonar</button>
        </div>
      </main>

      <section id="quick-upgrades"></section>

      <nav id="tabbar">
        <button type="button" data-tab="escarbar">Escarbar</button>
        <button type="button" data-tab="tienda">Contenedores</button>
        <button type="button" data-tab="automatizacion">Automatización</button>
        <button type="button" data-tab="logros">Logros</button>
        <button type="button" data-tab="prestigio">Prestigio</button>
        <button type="button" data-tab="index">Índice</button>
      </nav>
      <section id="tab-content"></section>
    </div>

    <div id="toast-container" aria-live="polite"></div>
    <div id="tutorial-overlay" hidden></div>
    <div id="offline-modal" class="modal-overlay" hidden></div>
    <div id="celebration-modal" class="modal-overlay" hidden></div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
