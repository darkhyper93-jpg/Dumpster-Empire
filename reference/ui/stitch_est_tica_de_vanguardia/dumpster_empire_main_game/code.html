<body class="font-body-md industrial-grid min-h-screen flex flex-col">
<!-- TopAppBar -->

<div class="flex flex-col">

</div>
<div class="flex items-center gap-4">
<div class="bg-surface-container-highest px-3 py-1.5 rounded-lg flex items-center gap-2 border border-outline-variant">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">monetization_on</span>

</div>
<div class="bg-surface-container-highest px-3 py-1.5 rounded-lg flex items-center gap-2 border border-outline-variant">

<span class="font-fredoka text-lg font-bold text-on-surface">3</span>
</div>
<button class="w-10 h-10 rounded-full bg-surface-variant flex items-center justify-center hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</header>
<!-- Main Content (Canvas) -->
<main class="flex-1 flex flex-col items-center justify-center pt-20 pb-32 px-4 relative">
<!-- Scavenging Area -->
<div class="w-full max-w-md relative group">
<!-- Street Bin Label -->
<div class="absolute -top-6 left-1/2 -translate-x-1/2 bg-surface-container-high border-2 border-outline-variant px-4 py-1 rounded-t-xl z-10">
<span class="font-label-caps text-xs text-on-surface-variant uppercase tracking-widest">Street Bin (Tacho de vereda)</span>
</div>
<!-- The Bin Card -->
<div class="scavenge-card w-full aspect-square rounded-3xl p-6 relative overflow-hidden cursor-crosshair select-none touch-none" id="bin-area">
<div class="metal-texture absolute inset-0"></div>
<!-- Visual Feedback Container -->
<div class="absolute inset-0 m-4 rounded-2xl border-2 border-dashed border-outline-variant flex items-center justify-center overflow-hidden" id="trash-visuals">
<!-- Layered Scratched Look -->
<div class="absolute inset-0 scratch-surface opacity-40"></div>
<!-- SVG Overlay of generic trash objects -->
<div class="relative w-full h-full opacity-60" id="scrap-container">
<!-- Content injected via JS -->
</div>
<!-- Centered Interaction Prompt -->
<div class="relative z-20 pointer-events-none flex flex-col items-center gap-3">
<div class="w-16 h-16 rounded-full border-4 border-primary/40 animate-ping absolute"></div>
<span class="material-symbols-outlined text-primary text-5xl">touch_app</span>
<span class="font-label-caps text-primary text-sm tracking-[0.2em]">DRAG TO SCAVENGE</span>
</div>
</div>
</div>
<!-- Rarity Pulse -->
<div class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-4/5 h-1 bg-primary/20 blur-md"></div>

</button>

</a>

<span class="material-symbols-outlined">precision_manufacturing</span>

</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant opacity-70 hover:text-primary transition-all" href="#">
<span class="material-symbols-outlined">emoji_events</span>
<span class="font-label-caps text-xs">Achievements</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant opacity-70 hover:text-primary transition-all" href="#">
<span class="material-symbols-outlined">keyboard_double_arrow_up</span>
<span class="font-label-caps text-xs">Prestige</span>
</a>

<script>
        // Micro-interaction for the bin
        const binArea = document.getElementById('bin-area');
        const scrapContainer = document.getElementById('scrap-container');
        const balanceEl = document.getElementById('balance-counter');
        let balance = 14280;

        // Interaction logic
        const handleScavenge = (e) => {
            // Prevent scrolling
            if(e.type === 'touchmove') e.preventDefault();

            // Spawn floating scrap indicator
            const rect = binArea.getBoundingClientRect();
            let x, y;
            if(e.type.includes('mouse')) {
                x = e.clientX - rect.left;
                y = e.clientY - rect.top;
            } else {
                x = e.touches[0].clientX - rect.left;
                y = e.touches[0].clientY - rect.top;
            }

            if(Math.random() > 0.85) { // Throttle visual spawn
                spawnScrap(x, y);
                updateBalance(Math.floor(Math.random() * 5) + 1);
            }
        };

        const spawnScrap = (x, y) => {
            const icons = ['can_outdoor', 'nest_eco_leaf', 'deployed_code', 'broken_image'];
            const icon = icons[Math.floor(Math.random() * icons.length)];
            
            const scrap = document.createElement('div');
            scrap.className = 'absolute material-symbols-outlined pointer-events-none transition-all duration-700 ease-out text-scrap-gray';
            scrap.style.left = `${x}px`;
            scrap.style.top = `${y}px`;
            scrap.style.fontSize = '24px';
            scrap.innerText = icon;

            scrapContainer.appendChild(scrap);

            // Animate out
            requestAnimationFrame(() => {
                scrap.style.transform = `translate(${(Math.random() - 0.5) * 100}px, -100px) scale(0.5)`;
                scrap.style.opacity = '0';
            });

            setTimeout(() => scrap.remove(), 700);
        };

        const updateBalance = (amount) => {
            balance += amount;
            balanceEl.innerText = `$ ${balance.toLocaleString()}`;
            balanceEl.classList.add('text-primary');
            setTimeout(() => balanceEl.classList.remove('text-primary'), 100);
        };

        binArea.addEventListener('mousemove', (e) => {
            if(e.buttons === 1) handleScavenge(e);
        });
        binArea.addEventListener('touchmove', handleScavenge);
        binArea.addEventListener('mousedown', handleScavenge);

        // Haptic feel - scale the whole card on click
        binArea.addEventListener('mousedown', () => binArea.style.transform = 'scale(0.98)');
        window.addEventListener('mouseup', () => binArea.style.transform = 'scale(1)');
    </script>
</body></html>
